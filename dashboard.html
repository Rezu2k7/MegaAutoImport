<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAi Portal | Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <script>if (!sessionStorage.getItem('mai_user')) { window.location.replace('login.html'); }</script>
</head>
<body>
    <header class="mobile-top-nav">
        <div class="mobile-logo">MAi <span class="accent">Portal</span></div>
        <button id="mobileMenuToggle" class="hamburger-menu">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="brand-logo hide-mobile"><h2>MAi <span class="accent">Portal</span></h2></div>
            <nav class="nav-menu">
                <a href="#" class="nav-link active" id="tabGarage">Inventory</a>
                <a href="#" class="nav-link admin-only" id="tabAddCar">Add Vehicle</a>
                <a href="#" class="nav-link admin-only" id="tabUsers">Manage Users</a>
                <a href="#" class="nav-link logout">Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar hide-mobile">
                <h1>Dashboard</h1>
                <div class="user-info">Role: <strong id="user-display"></strong></div>
            </header>

            <section id="viewGarage">
                <h3 style="margin-bottom: 20px;">Current Stock</h3>
                <div class="car-grid" id="carGrid"></div>
            </section>

            <section class="hidden" id="viewAddCar">
                <h3 style="margin-bottom: 20px;">Admin: Add Vehicle</h3>
                <form class="add-car-form" id="addCarForm">
                    <div class="form-group"><label>Make & Model</label><input type="text" id="carMake" required></div>
                    
                    <div class="flex-row">
                        <div class="form-group"><label>Auction Price ($)</label><input type="number" id="auctionPrice" value="0" required></div>
                        <div class="form-group"><label>Transporting Price ($)</label><input type="number" id="transportPrice" value="0" required></div>
                        <div class="form-group"><label>Client Paid ($)</label><input type="number" id="amountPaid" value="0" required></div>
                        <div class="form-group"><label>Left to Pay</label><input type="text" id="leftToPayDisplay" value="$0" readonly style="color: #ffcc00; font-weight: bold;"></div>
                    </div>

                    <div class="flex-row">
                        <div class="form-group"><label>Recipient First Name</label><input type="text" id="recFirstName"></div>
                        <div class="form-group"><label>Recipient Last Name</label><input type="text" id="recLastName"></div>
                        <div class="form-group"><label>ID Number</label><input type="text" id="recId"></div>
                        <div class="form-group"><label>Phone Number</label><input type="text" id="recPhone"></div>
                    </div>

                    <div class="flex-row">
                        <div class="form-group"><label>Purchase Date</label><input type="date" id="carPurchaseDate"></div>
                        <div class="form-group"><label>Auction Name</label>
                            <select id="carAuctionName">
                                <option value="Copart">Copart</option>
                                <option value="IAAI">IAAI</option>
                                <option value="Manheim">Manheim</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Buy Location</label><input type="text" id="carBuyLocation"></div>
                    </div>

                    <div class="flex-row">
                        <div class="form-group"><label>VIN Number</label><input type="text" id="carVin" required></div>
                        <div class="form-group"><label>Lot Number</label><input type="text" id="carLotNumber"></div>
                        <div class="form-group"><label>Assign to Dealer</label><input type="text" id="carDealer" required></div>
                    </div>

                    <div class="flex-row">
                        <div class="form-group"><label>Container Number</label><input type="text" id="carContainerNumber"></div>
                        <div class="form-group"><label>Container Code</label><input type="text" id="carContainerCode"></div>
                    </div>

                    <div class="form-group"><label>Photos (Select Multiple)</label><input type="file" id="carPhotos" multiple></div>
                    <button type="submit" class="btn-primary">Save to Database</button>
                </form>
            </section>

            <section class="hidden" id="viewUsers">
                <h3 style="margin-bottom: 20px;">Admin: Create New Account</h3>
                <form class="add-car-form" id="addUserForm">
                    <div class="form-group"><label>New Username</label><input type="text" id="newUsername" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="newPassword" required></div>
                    <div class="form-group"><label>Role</label>
                        <select id="newRole"><option value="dealer">Dealer</option><option value="admin">Admin</option></select>
                    </div>
                    <button type="submit" class="btn-primary">Create User</button>
                </form>
            </section>
        </main>
    </div>

    <div id="carModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
    <div id="imageLightbox" class="lightbox hidden">
        <span class="close-lightbox" id="closeLightbox">&times;</span>
        <img id="lightboxImg" src="">
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
